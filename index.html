<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리들의 모임 🌿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm: #f2ebe0;
    --sand: #e8ddd0;
    --bark: #b8956a;
    --moss: #7a9e7e;
    --dusk: #8f7b6e;
    --ink: #3d2f28;
    --fog: #c9bdb5;
    --blush: #e8c4a0;
    --leaf: #a8c5a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ───── 배경 텍스처 ───── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,149,106,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(122,158,126,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ───── 로그인 화면 ───── */
  #loginScreen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--cream);
  }

  .login-card {
    text-align: center;
    padding: 3rem 2rem;
    max-width: 340px;
    width: 90%;
  }

  .login-emoji { font-size: 3.5rem; margin-bottom: 1.2rem; display: block; }

  .login-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }

  .login-sub {
    color: var(--dusk);
    font-size: 0.9rem;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .login-input {
    width: 100%;
    padding: 0.9rem 1.2rem;
    border: 2px solid var(--sand);
    border-radius: 50px;
    background: white;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    text-align: center;
    letter-spacing: 0.2em;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }

  .login-input:focus { border-color: var(--bark); }

  .login-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--bark);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .login-btn:active { transform: scale(0.97); }
  .login-btn:hover { background: var(--dusk); }

  .login-error {
    color: #c0392b;
    font-size: 0.85rem;
    margin-top: 0.6rem;
    display: none;
  }

  /* ───── 메인 앱 ───── */
  #app { display: none; position: relative; z-index: 1; }

  /* ───── 헤더 ───── */
  .site-header {
    padding: 2rem 1.5rem 1rem;
    text-align: center;
    position: relative;
  }

  .site-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .site-subtitle {
    color: var(--dusk);
    font-size: 0.85rem;
    margin-top: 0.3rem;
  }

  .header-decor {
    width: 40px; height: 2px;
    background: linear-gradient(to right, var(--bark), var(--moss));
    margin: 0.8rem auto 0;
    border-radius: 2px;
  }

  /* ───── 탭 네비 ───── */
  .tab-nav {
    display: flex;
    gap: 0;
    margin: 1.5rem 1.5rem 0;
    background: var(--warm);
    border-radius: 50px;
    padding: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 0.6rem 0.5rem;
    border: none;
    background: transparent;
    border-radius: 50px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 0.82rem;
    color: var(--dusk);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn.active {
    background: white;
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* ───── 탭 콘텐츠 ───── */
  .tab-content { display: none; padding: 1.5rem; }
  .tab-content.active { display: block; }

  /* ───── 모임 카드 ───── */
  .gathering-card {
    background: white;
    border-radius: 20px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(61,47,40,0.07);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: linear-gradient(135deg, var(--warm), var(--sand));
    padding: 1.2rem 1.4rem 1rem;
    position: relative;
  }

  .card-emoji { font-size: 1.6rem; margin-bottom: 0.3rem; display: block; }

  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--ink);
  }

  .card-date {
    font-size: 0.78rem;
    color: var(--dusk);
    margin-top: 0.2rem;
  }

  .card-body { padding: 1.2rem 1.4rem; }

  .card-story {
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.8;
    margin-bottom: 1rem;
  }

  /* 장소 태그 */
  .place-tags {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .place-tag {
    background: var(--warm);
    color: var(--dusk);
    padding: 0.3rem 0.8rem;
    border-radius: 50px;
    font-size: 0.78rem;
  }

  /* 사진 그리드 */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .photo-grid.one { grid-template-columns: 1fr; }
  .photo-grid.two { grid-template-columns: 1fr 1fr; }

  .photo-item {
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }

  .photo-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .photo-item:hover img { transform: scale(1.05); }

  .photo-more {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 1.2rem;
    font-weight: 600;
  }

  /* 지출 요약 */
  .expense-summary {
    background: var(--warm);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
  }

  .expense-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.85rem;
    padding: 0.25rem 0;
    color: var(--dusk);
  }

  .expense-row.total {
    border-top: 1px dashed var(--sand);
    margin-top: 0.5rem;
    padding-top: 0.7rem;
    font-size: 0.95rem;
    color: var(--ink);
    font-weight: 600;
  }

  .expense-row.balance {
    color: var(--moss);
    font-size: 0.88rem;
    font-weight: 600;
  }

  /* 댓글 */
  .comments-section { border-top: 1px solid var(--warm); padding-top: 1rem; }

  .comment-item {
    display: flex; gap: 0.7rem;
    margin-bottom: 0.8rem;
    align-items: flex-start;
  }

  .comment-avatar {
    width: 30px; height: 30px;
    background: var(--blush);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    color: var(--bark);
    flex-shrink: 0;
    font-weight: 600;
  }

  .comment-bubble {
    background: var(--warm);
    border-radius: 0 14px 14px 14px;
    padding: 0.6rem 0.9rem;
    flex: 1;
  }

  .comment-name {
    font-size: 0.72rem;
    color: var(--bark);
    font-weight: 600;
    margin-bottom: 0.2rem;
  }

  .comment-text { font-size: 0.85rem; color: var(--ink); line-height: 1.5; }

  .comment-input-row {
    display: flex; gap: 0.5rem;
    margin-top: 0.8rem;
  }

  .comment-name-input, .comment-text-input {
    border: 1.5px solid var(--sand);
    border-radius: 50px;
    padding: 0.5rem 0.9rem;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 0.83rem;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  .comment-name-input { width: 80px; flex-shrink: 0; }
  .comment-text-input { flex: 1; }
  .comment-name-input:focus, .comment-text-input:focus { border-color: var(--bark); }

  .comment-submit {
    width: 36px; height: 36px;
    background: var(--moss);
    border: none; border-radius: 50%;
    color: white; font-size: 1rem;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }

  .comment-submit:active { transform: scale(0.93); }

  /* ───── 회비 탭 ───── */
  .fee-overview {
    background: linear-gradient(135deg, var(--bark), var(--dusk));
    border-radius: 20px;
    padding: 1.5rem;
    color: white;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .fee-overview-label { font-size: 0.82rem; opacity: 0.8; }
  .fee-overview-amount {
    font-family: 'Noto Serif KR', serif;
    font-size: 2.2rem;
    font-weight: 600;
    margin: 0.3rem 0;
  }

  .fee-overview-sub { font-size: 0.82rem; opacity: 0.75; }

  .fee-card {
    background: white;
    border-radius: 16px;
    margin-bottom: 1rem;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(61,47,40,0.06);
  }

  .fee-card-header {
    padding: 1rem 1.2rem 0.6rem;
    border-bottom: 1px solid var(--warm);
    display: flex; justify-content: space-between; align-items: center;
  }

  .fee-card-title { font-size: 0.95rem; font-weight: 600; color: var(--ink); }
  .fee-card-date { font-size: 0.75rem; color: var(--fog); }

  .fee-items { padding: 0.8rem 1.2rem 1rem; }

  .fee-item {
    display: flex; justify-content: space-between;
    font-size: 0.83rem;
    padding: 0.3rem 0;
    color: var(--dusk);
    border-bottom: 1px dotted var(--sand);
  }

  .fee-item:last-child { border-bottom: none; }

  .fee-item-amount { color: var(--ink); font-weight: 600; }

  .fee-balance-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.7rem 1.2rem;
    background: var(--warm);
    font-size: 0.85rem;
  }

  .balance-positive { color: var(--moss); font-weight: 600; }
  .balance-negative { color: #c0392b; font-weight: 600; }

  /* ───── 갤러리 탭 ───── */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .gallery-item {
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }

  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .gallery-item:hover img { transform: scale(1.05); }

  .gallery-section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    color: var(--dusk);
    margin: 1.2rem 0 0.6rem;
    display: flex; align-items: center; gap: 0.5rem;
  }

  .gallery-section-title::after {
    content: ''; flex: 1;
    height: 1px; background: var(--sand);
  }

  /* ───── FAB (글쓰기) ───── */
  .fab {
    position: fixed;
    bottom: 2rem; right: 1.5rem;
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--bark), var(--moss));
    border: none; border-radius: 50%;
    color: white; font-size: 1.5rem;
    box-shadow: 0 4px 16px rgba(184,149,106,0.45);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 50;
  }

  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(184,149,106,0.5); }
  .fab:active { transform: scale(0.95); }

  /* ───── 모달 (글쓰기/보기) ───── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(61,47,40,0.4);
    backdrop-filter: blur(3px);
    display: none; align-items: flex-end; justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal-sheet {
    background: var(--cream);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 1.5rem;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--sand);
    border-radius: 2px;
    margin: 0 auto 1.2rem;
  }

  .modal-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 1.2rem;
  }

  .form-label {
    display: block;
    font-size: 0.78rem;
    color: var(--dusk);
    margin-bottom: 0.3rem;
    margin-top: 1rem;
  }

  .form-input, .form-textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--sand);
    border-radius: 12px;
    background: white;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-textarea:focus { border-color: var(--bark); }
  .form-textarea { resize: none; min-height: 100px; line-height: 1.7; }

  .form-row { display: flex; gap: 0.7rem; }
  .form-row .form-input { flex: 1; }

  /* 지출 항목 */
  .expense-items { }

  .expense-item-row {
    display: flex; gap: 0.5rem; align-items: center;
    margin-bottom: 0.5rem;
  }

  .expense-item-row .form-input { flex: 1; }
  .expense-item-row .form-input.amount { width: 100px; flex: 0 0 100px; }

  .add-expense-btn {
    background: none;
    border: 1.5px dashed var(--sand);
    border-radius: 10px;
    padding: 0.6rem;
    width: 100%;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 0.83rem;
    color: var(--dusk);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 0.3rem;
  }

  .add-expense-btn:hover { border-color: var(--bark); color: var(--bark); }

  .remove-btn {
    width: 28px; height: 28px;
    background: var(--warm);
    border: none; border-radius: 50%;
    color: var(--fog);
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }

  .remove-btn:hover { background: #fde8e8; color: #c0392b; }

  /* 회비 입력 */
  .member-fee-row {
    display: flex; gap: 0.5rem; align-items: center;
    margin-bottom: 0.5rem;
  }

  /* 구글 드라이브 링크 */
  .drive-link-area {
    display: flex; gap: 0.5rem; align-items: center;
  }

  .drive-link-area .form-input { flex: 1; }

  .drive-preview {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin-top: 0.7rem;
  }

  .drive-thumb {
    width: 70px; height: 70px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background: var(--warm);
    display: flex; align-items: center; justify-content: center;
  }

  .drive-thumb img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .drive-thumb .remove-thumb {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.5);
    border: none; border-radius: 50%;
    color: white; font-size: 0.7rem;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }

  .emoji-picker {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
    margin-top: 0.5rem;
  }

  .emoji-opt {
    font-size: 1.3rem;
    padding: 0.3rem;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }

  .emoji-opt.selected { border-color: var(--bark); background: var(--warm); }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--bark), var(--moss));
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity 0.2s, transform 0.1s;
  }

  .submit-btn:active { transform: scale(0.97); opacity: 0.9; }

  /* ───── 라이트박스 ───── */
  #lightbox {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 95vw; max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
  }

  #lightbox .lb-close {
    position: absolute; top: 1rem; right: 1rem;
    background: rgba(255,255,255,0.15);
    border: none; border-radius: 50%;
    width: 40px; height: 40px;
    color: white; font-size: 1.2rem;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }

  /* ───── 빈 상태 ───── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--fog);
  }

  .empty-state-emoji { font-size: 3rem; display: block; margin-bottom: 0.8rem; }
  .empty-state-text { font-size: 0.9rem; line-height: 1.7; }

  /* ───── 반응형 ───── */
  @media (min-width: 600px) {
    .tab-btn { font-size: 0.9rem; }
    .modal-sheet { border-radius: 24px; margin: auto; max-height: 88vh; }
    .modal-overlay { align-items: center; }
    .gallery-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* 설정 탭 */
  .settings-section {
    background: white;
    border-radius: 16px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(61,47,40,0.05);
  }

  .settings-title {
    font-size: 0.78rem;
    color: var(--dusk);
    font-weight: 600;
    margin-bottom: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .settings-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--warm);
    font-size: 0.88rem;
    color: var(--ink);
  }

  .settings-item:last-child { border-bottom: none; }

  .settings-val {
    font-size: 0.82rem;
    color: var(--dusk);
  }

  .danger-btn {
    width: 100%;
    padding: 0.8rem;
    background: none;
    border: 1.5px solid #e0b0b0;
    border-radius: 12px;
    color: #c0392b;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .danger-btn:hover { background: #fde8e8; }

  /* 누적 잔액 표시 */
  .total-balance-bar {
    background: linear-gradient(to right, var(--moss), var(--bark));
    color: white;
    border-radius: 14px;
    padding: 1rem 1.4rem;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1.2rem;
  }

  .tb-label { font-size: 0.82rem; opacity: 0.85; }
  .tb-amount { font-family: 'Noto Serif KR', serif; font-size: 1.4rem; font-weight: 600; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="login-card">
    <span class="login-emoji">🍃</span>
    <div class="login-title">우리들의 모임</div>
    <div class="login-sub">소중한 우리만의 공간이에요<br>비밀번호를 입력해주세요</div>
    <input type="password" class="login-input" id="pwInput" placeholder="• • • • •" maxlength="20"
      onkeydown="if(event.key==='Enter') tryLogin()">
    <button class="login-btn" onclick="tryLogin()">들어가기</button>
    <div class="login-error" id="loginError">비밀번호가 틀렸어요 🥲</div>
  </div>
</div>

<!-- 메인 앱 -->

<script>
// ═══════════════════════════════════
//  설정 & 상수
// ═══════════════════════════════════
const STORAGE_KEY = 'gathering_v1';
const SETTINGS_KEY = 'gathering_settings_v1';
const AUTH_KEY = 'gathering_auth_v1';
const DEFAULT_PW = '1234'; // 초기 비밀번호

const EMOJIS = ['🌿','🍽','🏕','🎉','🍻','☕','🌸','🎬','🚗','🌊','🍰','🏖','🍜','🎶','✈️','🏔'];

// ═══════════════════════════════════
//  데이터 관리
// ═══════════════════════════════════
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadSettings() {
  const def = { groupName:'우리들의 모임', members:'', password: DEFAULT_PW };
  try { return Object.assign(def, JSON.parse(localStorage.getItem(SETTINGS_KEY))); }
  catch { return def; }
}

function saveSettings() {
  const s = loadSettings();
  s.groupName = document.getElementById('groupNameInput').value.trim() || s.groupName;
  s.members = document.getElementById('membersInput').value.trim();
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  applySettings();
  alert('저장됐어요 🌿');
}

function changePassword() {
  const np = document.getElementById('newPwInput').value.trim();
  if (!np) { alert('새 비밀번호를 입력해주세요'); return; }
  const s = loadSettings();
  s.password = np;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  document.getElementById('newPwInput').value = '';
  alert('비밀번호가 변경됐어요 🔑');
}

function applySettings() {
  const s = loadSettings();
  document.getElementById('site-title-text') && (document.getElementById('site-title-text').textContent = s.groupName);
  document.querySelector('.site-title').textContent = '🌿 ' + s.groupName;
  document.getElementById('memberNames').textContent = s.members || '친구들과 함께하는 소소한 기록';
  document.getElementById('st-groupName').textContent = s.groupName;
  document.getElementById('st-members').textContent = s.members || '-';
  document.getElementById('groupNameInput').value = s.groupName;
  document.getElementById('membersInput').value = s.members;
}

// ═══════════════════════════════════
//  인증
// ═══════════════════════════════════
function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  const s = loadSettings();
  if (pw === s.password) {
    sessionStorage.setItem(AUTH_KEY, '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}

function logout() {
  sessionStorage.removeItem(AUTH_KEY);
  location.reload();
}

// ═══════════════════════════════════
//  초기화
// ═══════════════════════════════════
function init() {
  applySettings();
  initEmojiPicker();
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  renderMemories();
  renderFees();
  renderGallery();
  // 기본 지출/회비/드라이브 행
  addExpenseRow();
  addFeeRow();
  addDriveLink();
}

window.onload = function() {
  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }
  document.getElementById('pwInput').focus();
};

// ═══════════════════════════════════
//  이모지 피커
// ═══════════════════════════════════
let selectedEmoji = '🌿';

function initEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.type = 'button';
    btn.onclick = () => {
      selectedEmoji = e;
      document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    picker.appendChild(btn);
  });
}

// ═══════════════════════════════════
//  탭 전환
// ═══════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('fabBtn').style.display = name === 'memories' ? 'flex' : 'none';
}

// ═══════════════════════════════════
//  지출 행
// ═══════════════════════════════════
function addExpenseRow(name='', amount='') {
  const row = document.createElement('div');
  row.className = 'expense-item-row';
  row.innerHTML = `
    <input type="text" class="form-input exp-name" placeholder="항목 (예: 저녁식사)" value="${name}">
    <input type="number" class="form-input amount exp-amt" placeholder="금액" value="${amount}">
    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
  `;
  document.getElementById('expenseList').appendChild(row);
}

function addFeeRow(name='', amount='') {
  const row = document.createElement('div');
  row.className = 'expense-item-row';
  row.innerHTML = `
    <input type="text" class="form-input fee-name" placeholder="이름" value="${name}">
    <input type="number" class="form-input amount fee-amt" placeholder="납부 금액" value="${amount}">
    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
  `;
  document.getElementById('feeList').appendChild(row);
}

function addDriveLink(link='') {
  const row = document.createElement('div');
  row.className = 'expense-item-row';
  row.innerHTML = `
    <input type="url" class="form-input drive-url" placeholder="구글 드라이브 링크" value="${link}" style="font-size:0.78rem">
    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
  `;
  document.getElementById('driveLinks').appendChild(row);
}

// ═══════════════════════════════════
//  구글 드라이브 URL → 직접 이미지 URL 변환
// ═══════════════════════════════════
function driveUrlToThumb(url) {
  // https://drive.google.com/file/d/FILE_ID/view → thumbnail
  const m = url.match(/\/file\/d\/([^/]+)\//);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  // https://drive.google.com/open?id=FILE_ID
  const m2 = url.match(/[?&]id=([^&]+)/);
  if (m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w400`;
  return url;
}

function driveUrlToFull(url) {
  const m = url.match(/\/file\/d\/([^/]+)\//);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  const m2 = url.match(/[?&]id=([^&]+)/);
  if (m2) return `https://drive.google.com/file/d/${m2[1]}/preview`;
  return url;
}

// ═══════════════════════════════════
//  모임 저장
// ═══════════════════════════════════
function submitGathering() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('모임 이름을 입력해주세요 😊'); return; }

  const expenses = [];
  document.querySelectorAll('.expense-item-row').forEach(row => {
    const n = row.querySelector('.exp-name');
    const a = row.querySelector('.exp-amt');
    if (n && a && n.value.trim()) expenses.push({ name: n.value.trim(), amount: parseInt(a.value) || 0 });
  });

  const fees = [];
  document.querySelectorAll('#feeList .expense-item-row').forEach(row => {
    const n = row.querySelector('.fee-name');
    const a = row.querySelector('.fee-amt');
    if (n && a && n.value.trim()) fees.push({ name: n.value.trim(), amount: parseInt(a.value) || 0 });
  });

  const driveLinks = [];
  document.querySelectorAll('.drive-url').forEach(inp => {
    if (inp.value.trim()) driveLinks.push(inp.value.trim());
  });

  const gathering = {
    id: Date.now(),
    emoji: selectedEmoji,
    title,
    date: document.getElementById('f-date').value,
    type: document.getElementById('f-type').value,
    places: document.getElementById('f-places').value.split(',').map(s => s.trim()).filter(Boolean),
    story: document.getElementById('f-story').value.trim(),
    expenses,
    fees,
    driveLinks,
    comments: []
  };

  const data = loadData();
  data.unshift(gathering);
  saveData(data);

  closeWriteModal();
  renderMemories();
  renderFees();
  renderGallery();
}

// ═══════════════════════════════════
//  렌더링 — 기록 탭
// ═══════════════════════════════════
function renderMemories() {
  const data = loadData();
  const list = document.getElementById('memoriesList');
  const empty = document.getElementById('memoriesEmpty');
  list.innerHTML = '';

  if (!data.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  data.forEach((g, gi) => {
    const totalExp = g.expenses.reduce((s, e) => s + e.amount, 0);
    const totalFee = g.fees.reduce((s, f) => s + f.amount, 0);
    const balance = totalFee - totalExp;

    const card = document.createElement('div');
    card.className = 'gathering-card';
    card.style.animationDelay = (gi * 0.07) + 's';

    // 사진 그리드
    let photoHtml = '';
    if (g.driveLinks && g.driveLinks.length) {
      const cols = g.driveLinks.length === 1 ? 'one' : g.driveLinks.length === 2 ? 'two' : '';
      const show = g.driveLinks.slice(0, 4);
      const more = g.driveLinks.length - 4;
      photoHtml = `<div class="photo-grid ${cols}">` + show.map((url, i) => {
        const thumb = driveUrlToThumb(url);
        const isLast = i === 3 && more > 0;
        return `<div class="photo-item" onclick="openLightbox('${thumb}')">
          <img src="${thumb}" onerror="this.style.display='none'" loading="lazy">
          ${isLast ? `<div class="photo-more">+${more}</div>` : ''}
        </div>`;
      }).join('') + '</div>';
    }

    // 지출 내역
    let expHtml = '';
    if (g.expenses.length) {
      expHtml = `<div class="expense-summary">
        ${g.expenses.map(e => `<div class="expense-row"><span>${e.name}</span><span>${e.amount.toLocaleString()}원</span></div>`).join('')}
        <div class="expense-row total"><span>총 지출</span><span>${totalExp.toLocaleString()}원</span></div>
        ${totalFee > 0 ? `<div class="expense-row balance"><span>잔액</span><span>${balance >= 0 ? '+' : ''}${balance.toLocaleString()}원</span></div>` : ''}
      </div>`;
    }

    // 장소 태그
    const placeHtml = g.places.length
      ? `<div class="place-tags">${g.places.map(p => `<span class="place-tag">📍 ${p}</span>`).join('')}</div>` : '';

    // 댓글
    const cmts = (g.comments || []).map(c => `
      <div class="comment-item">
        <div class="comment-avatar">${c.name.slice(0,1)}</div>
        <div class="comment-bubble">
          <div class="comment-name">${c.name}</div>
          <div class="comment-text">${c.text}</div>
        </div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="card-emoji">${g.emoji}</span>
        <div class="card-title">${g.title}</div>
        <div class="card-date">${formatDate(g.date)} · ${g.type}</div>
      </div>
      <div class="card-body">
        ${placeHtml}
        ${g.story ? `<div class="card-story">${g.story.replace(/\n/g,'<br>')}</div>` : ''}
        ${photoHtml}
        ${expHtml}
        <div class="comments-section">
          <div id="cmts-${g.id}">${cmts}</div>
          <div class="comment-input-row">
            <input type="text" class="comment-name-input" id="cn-${g.id}" placeholder="이름">
            <input type="text" class="comment-text-input" id="ct-${g.id}" placeholder="한마디 남기기 💬"
              onkeydown="if(event.key==='Enter') addComment(${g.id})">
            <button class="comment-submit" onclick="addComment(${g.id})">↑</button>
          </div>
        </div>
      </div>
    `;

    list.appendChild(card);
  });
}

function addComment(gid) {
  const name = document.getElementById('cn-' + gid).value.trim();
  const text = document.getElementById('ct-' + gid).value.trim();
  if (!name || !text) { alert('이름과 내용을 입력해주세요'); return; }

  const data = loadData();
  const g = data.find(x => x.id === gid);
  if (!g) return;
  g.comments = g.comments || [];
  g.comments.push({ name, text, at: Date.now() });
  saveData(data);

  const cmtsEl = document.getElementById('cmts-' + gid);
  cmtsEl.innerHTML += `
    <div class="comment-item">
      <div class="comment-avatar">${name.slice(0,1)}</div>
      <div class="comment-bubble">
        <div class="comment-name">${name}</div>
        <div class="comment-text">${text}</div>
      </div>
    </div>
  `;
  document.getElementById('cn-' + gid).value = '';
  document.getElementById('ct-' + gid).value = '';
}

// ═══════════════════════════════════
//  렌더링 — 회비 탭
// ═══════════════════════════════════
function renderFees() {
  const data = loadData();
  const list = document.getElementById('feesList');
  list.innerHTML = '';

  let totalCollected = 0, totalSpent = 0;
  data.forEach(g => {
    totalCollected += g.fees.reduce((s, f) => s + f.amount, 0);
    totalSpent += g.expenses.reduce((s, e) => s + e.amount, 0);
  });

  const remaining = totalCollected - totalSpent;

  list.innerHTML = `
    <div class="fee-overview">
      <div class="fee-overview-label">누적 회비 잔액</div>
      <div class="fee-overview-amount">${remaining.toLocaleString()}원</div>
      <div class="fee-overview-sub">총 납부 ${totalCollected.toLocaleString()}원 · 총 지출 ${totalSpent.toLocaleString()}원</div>
    </div>
  `;

  if (!data.length) {
    list.innerHTML += `<div class="empty-state"><span class="empty-state-emoji">💸</span><div class="empty-state-text">회비 내역이 없어요</div></div>`;
    return;
  }

  data.forEach(g => {
    const spent = g.expenses.reduce((s, e) => s + e.amount, 0);
    const collected = g.fees.reduce((s, f) => s + f.amount, 0);
    const bal = collected - spent;

    const card = document.createElement('div');
    card.className = 'fee-card';

    const expRows = g.expenses.map(e =>
      `<div class="fee-item"><span>${e.name}</span><span class="fee-item-amount">-${e.amount.toLocaleString()}원</span></div>`
    ).join('');

    const feeRows = g.fees.map(f =>
      `<div class="fee-item"><span>${f.name} 납부</span><span class="fee-item-amount" style="color:var(--moss)">+${f.amount.toLocaleString()}원</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="fee-card-header">
        <span class="fee-card-title">${g.emoji} ${g.title}</span>
        <span class="fee-card-date">${formatDate(g.date)}</span>
      </div>
      <div class="fee-items">
        ${feeRows}
        ${expRows}
      </div>
      <div class="fee-balance-row">
        <span>모임 잔액</span>
        <span class="${bal >= 0 ? 'balance-positive' : 'balance-negative'}">${bal >= 0 ? '+' : ''}${bal.toLocaleString()}원</span>
      </div>
    `;

    list.appendChild(card);
  });
}

// ═══════════════════════════════════
//  렌더링 — 갤러리 탭
// ═══════════════════════════════════
function renderGallery() {
  const data = loadData();
  const content = document.getElementById('galleryContent');
  const empty = document.getElementById('galleryEmpty');
  content.innerHTML = '';

  const allPhotos = [];
  data.forEach(g => {
    if (g.driveLinks && g.driveLinks.length) {
      allPhotos.push({ title: g.emoji + ' ' + g.title, date: g.date, links: g.driveLinks });
    }
  });

  if (!allPhotos.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  allPhotos.forEach(item => {
    const section = document.createElement('div');
    const titleEl = document.createElement('div');
    titleEl.className = 'gallery-section-title';
    titleEl.textContent = item.title;

    const grid = document.createElement('div');
    grid.className = 'gallery-grid';

    item.links.forEach(url => {
      const thumb = driveUrlToThumb(url);
      const el = document.createElement('div');
      el.className = 'gallery-item';
      el.innerHTML = `<img src="${thumb}" loading="lazy" onerror="this.parentElement.style.display='none'">`;
      el.onclick = () => openLightbox(thumb);
      grid.appendChild(el);
    });

    section.appendChild(titleEl);
    section.appendChild(grid);
    content.appendChild(section);
  });
}

// ═══════════════════════════════════
//  모달
// ═══════════════════════════════════
function openWriteModal() {
  document.getElementById('writeModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeWriteModal() {
  document.getElementById('writeModal').classList.remove('open');
  document.body.style.overflow = '';
  // 폼 초기화
  document.getElementById('f-title').value = '';
  document.getElementById('f-story').value = '';
  document.getElementById('f-places').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('expenseList').innerHTML = '';
  document.getElementById('feeList').innerHTML = '';
  document.getElementById('driveLinks').innerHTML = '';
  addExpenseRow(); addFeeRow(); addDriveLink();
  selectedEmoji = '🌿';
  initEmojiPicker();
}

function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════
//  유틸
// ═══════════════════════════════════
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;
}

// 모달 바깥 클릭 닫기
document.getElementById('writeModal').addEventListener('click', function(e) {
  if (e.target === this) closeWriteModal();
});
