<style>
  :root { --cream: #faf6f0; --warm: #f2ebe0; --sand: #e8ddd0; --bark: #b8956a; --moss: #7a9e7e; --dusk: #8f7b6e; --ink: #3d2f28; --fog: #c9bdb5; }
  body { background-color: var(--cream); font-family: 'Gowun Dodum', sans-serif; color: var(--ink); margin: 0; padding-bottom: 80px; }
  #app { display: none; }
  .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; background: var(--bark); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 90; }
  .tab-content { display: none; padding: 1.5rem; }
  .tab-content.active { display: block; }
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(61,47,40,0.4); display: none; align-items: flex-end; justify-content: center; }

<div id="loginScreen">
  <div class="login-card" style="text-align:center; padding-top:100px;">
    <h2>절친들의 수다</h2>
    <input type="password" id="pwInput" placeholder="비밀번호">
    <button id="loginBtn" onclick="tryLogin()">들어가기</button>
  </div>
</div>

<div id="app">
  <header class="site-header" style="text-align:center; padding:2rem;">

  </header>
  
  <nav class="tab-nav" style="display:flex; gap:10px; padding:0 20px;">
    <button onclick="switchTab('memories')">📖 기록</button>
    <button onclick="switchTab('fees')">💰 회비</button>
    <button onclick="switchTab('gallery')">🖼 갤러리</button>
    <button onclick="switchTab('settings')">⚙️ 설정</button>
  </nav>

  <div id="tab-memories" class="tab-content active"><div id="memoriesList"></div></div>
  <div id="tab-fees" class="tab-content"><div id="feesList"></div></div>
  <div id="tab-gallery" class="tab-content"><div id="galleryContent"></div></div>
  <div id="tab-settings" class="tab-content"><div id="settingsArea"></div></div>

  <button class="fab" onclick="handleFabClick()">＋</button>
</div>
